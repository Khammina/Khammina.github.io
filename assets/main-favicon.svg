<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#060810"/>
      <stop offset="100%" stop-color="#0e1830"/>
    </linearGradient>
    <linearGradient id="gk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#0090c8"/>
    </linearGradient>
    <linearGradient id="gs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowS" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rnd">
      <rect width="64" height="64" rx="13"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#gbg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.07" stroke="#00d2ff" stroke-width="0.4" clip-path="url(#rnd)">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>

  <!-- Border glow ring -->
  <rect width="64" height="64" rx="13" fill="none"
        stroke="#00d2ff" stroke-width="1.2" opacity="0.55"/>

  <!-- Corner brackets -->
  <g stroke="#00d2ff" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <polyline points="5,12 5,5 12,5"/>
    <polyline points="52,5 59,5 59,12"/>
    <polyline points="5,52 5,59 12,59"/>
    <polyline points="52,59 59,59 59,52"/>
  </g>

  <!-- K letter — cyan with glow -->
  <g filter="url(#glow)">
    <!-- Stem -->
    <line x1="11" y1="13" x2="11" y2="51"
          stroke="url(#gk)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Upper arm -->
    <line x1="11" y1="32" x2="29" y2="13"
          stroke="url(#gk)" stroke-width="3.8" stroke-linecap="round"/>
    <!-- Lower arm -->
    <line x1="11" y1="32" x2="29" y2="51"
          stroke="url(#gk)" stroke-width="3.8" stroke-linecap="round"/>
  </g>

  <!-- Divider dot — green -->
  <circle cx="32" cy="32" r="2.5" fill="#00ffb4" opacity="0.9"/>
  <circle cx="32" cy="32" r="4"   fill="#00ffb4" opacity="0.2"/>

  <!-- S letter — purple with glow -->
  <g filter="url(#glowS)">
    <path d="M53,20 Q53,13 46,13 Q37,13 37,20.5 Q37,28 46,30 Q55,32 55,40 Q55,51 45,51 Q36,51 35,44"
          fill="none" stroke="url(#gs)" stroke-width="3.8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>